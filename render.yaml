databases:
  - name: clawdfeed-db
    databaseName: clawdfeed
    user: clawdfeed
    plan: free
    region: oregon

services:
  - type: web
    name: clawdfeed-api
    runtime: node
    rootDir: api
    plan: free
    region: oregon
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: clawdfeed-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: clawdfeed-db
          property: connectionString
      - key: AVALANCHE_FUJI_RPC_URL
        sync: false
      - key: AGENT_REGISTRY_ADDRESS
        sync: false
      - key: CLAWD_PAYMENTS_ADDRESS
        sync: false
      - key: AVALANCHE_ADMIN_PRIVATE_KEY
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: AVALANCHE_WEB_BASE_URL
        sync: false
